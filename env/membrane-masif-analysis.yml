# membrane-masif analysis environment (Apple Silicon / Linux, Python 3.11)
#
# Covers: PLY loading and surface scoring, peptide-diffusion sampling
# (PyTorch + PyG), and MD-trajectory analysis (GROMACS / MDAnalysis / mdtraj /
# LiPyphilic).
#
# Notes:
#   - The legacy MaSIF descriptor neural network (Python 3.6 / TF1.x) is not
#     rebuilt here and is not needed for these analyses.
#   - Surface (re)generation via MSMS / APBS / pdb2pqr / PyMesh lives in
#     surface_preprocessing/, not in this environment.
#   - PyG is installed via pip: the conda-forge build lags behind and mixing the
#     pyg channel with conda-forge often fails to solve; pip wheels are
#     first-class on osx-arm64.
name: membrane-masif
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip

  # ---- core scientific ----
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - networkx
  - tqdm
  - h5py

  # ---- plotting / notebooks ----
  - matplotlib-base
  - seaborn
  - jupyterlab
  - ipython
  - ipywidgets

  # ---- cheminformatics ----
  - rdkit
  - openbabel
  - biopython

  # ---- MD trajectory analysis ----
  # lipyphilic conda-forge noarch 包错装了 linux x86_64 .so——改 pip 拉原生 wheel。
  - gromacs
  - mdanalysis
  - mdtraj

  # ---- mesh / PLY handling ----
  # open3d 暂不装：与 conda 的 libembree4 有 TBB ABI 冲突；trimesh+plyfile 已覆盖分析需求。
  - trimesh
  - plyfile
  - meshio

  # ---- visualization ----
  - pymol-open-source
  - nglview

  # ---- deep learning core (conda-forge native arm64) ----
  - pytorch

  - pip:
      # PyG 系列走 pip wheel（osx-arm64 cpu 通过纯 Python 实现）
      - torch_geometric
      # lipyphilic 走 pip 才能拿到原生 osx-arm64 wheel
      - lipyphilic
      - pdb-tools
